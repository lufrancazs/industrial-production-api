version: "3.8"

services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-production
    restart: always
    ports:
      - "1523:1521"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: production
      APP_USER_PASSWORD: production
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

volumes:
  oracle-data: